name: Outsight
options:
  bundleIdPrefix: com.ralph
targets:
  Outsight:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources: [Outsight]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ralph.Outsight
        INFOPLIST_FILE: Outsight/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - sdk: ScreenCaptureKit.framework
      - sdk: CoreGraphics.framework
      - sdk: AVFoundation.framework

  OutsightTests:
    type: bundle.unit-test
    platform: macOS
    sources: [OutsightTests]
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Outsight

  OutsightUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [OutsightUITests]
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Outsight
